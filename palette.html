<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DD · palette bench</title>
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
/* internal tool: the whole point is seeing the four real pages under one
   palette at once, so the chrome here stays out of the way. needs http
   (same-origin iframes) - open via scripts/serve.mjs, not file:// */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Familjen Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
header{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  padding:12px 22px;background:rgba(20,17,20,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
h1{font-size:15px;font-weight:700;letter-spacing:-.01em}
h1 span{font-family:'Space Mono',monospace;font-size:10px;color:var(--ink-soft);font-weight:400;margin-left:10px;letter-spacing:.08em}
.sw{display:flex;gap:8px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;cursor:pointer;
  border:1px solid var(--line);border-radius:999px;padding:7px 14px;background:transparent;color:var(--ink);
  transition:border-color .15s,background .15s}
.chip i{width:22px;height:12px;border-radius:3px;display:inline-block;border:1px solid rgba(255,255,255,.15)}
.chip:hover{border-color:var(--pink)}
.chip.on{background:var(--pink);border-color:var(--pink);color:var(--pink-ink)}
.note{font-family:'Space Mono',monospace;font-size:10px;color:var(--ink-dim);margin-left:auto;letter-spacing:.04em}
main{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px 22px 30px}
@media (max-width:1100px){main{grid-template-columns:1fr}}
.cell{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#000}
.cell .bar{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;
  background:var(--card);border-bottom:1px solid var(--line)}
.cell .bar b{font-size:12px;font-weight:600}
.cell .bar a{font-family:'Space Mono',monospace;font-size:10px;color:var(--ink-soft);text-decoration:none}
.cell .bar a:hover{color:var(--pink)}
.port{position:relative;height:420px;overflow:hidden}
.port iframe{width:1440px;height:1235px;border:0;transform-origin:0 0;position:absolute;top:0;left:0}
</style>
</head>
<body>
<header>
  <h1>palette bench<span>live pages · switch hits all four at once</span></h1>
  <div class="sw" id="sw"></div>
  <span class="note" id="note">tokens.css is the shipped default</span>
</header>
<main id="grid"></main>

<script>
const PAGES = [
  ["home.html", "Home"],
  ["start.html", "Start · garden"],
  ["mvp_v6.html", "Canvas · MVP"],
  ["library.html", "Library"],
];

/* each variant only moves the surface + temperature variables; type, accents
   and category colours stay put so the comparison isolates one decision */
const VARIANTS = {
  "rose/zoned · 定稿": { swatch:"#141114", vars:{} },
  "墨黑 · old ink": { swatch:"#070706", vars:{
    "--bg":"#070706", "--card":"#100F0C", "--panel":"#1A1916", "--canvas":"#141812",
  }},
  "苔青漫 · moss-forward": { swatch:"#111411", vars:{
    "--bg":"#111411", "--card":"#191D19", "--panel":"#212721", "--canvas":"#1B241C",
  }},
  "胭脂洇 · blush plum": { swatch:"#161014", vars:{
    "--bg":"#161014", "--card":"#201720", "--panel":"#2B1F28", "--canvas":"#182019",
  }},
};
/* union of every var any variant touches, so switching back clears leftovers */
const TOUCHED = [...new Set(Object.values(VARIANTS).flatMap(v => Object.keys(v.vars)))];

const grid = document.getElementById("grid");
const frames = [];
for (const [src, label] of PAGES) {
  const cell = document.createElement("div");
  cell.className = "cell";
  cell.innerHTML = `<div class="bar"><b>${label}</b><a href="${src}" target="_blank">open full ↗</a></div>
    <div class="port"><iframe src="${src}" title="${label}"></iframe></div>`;
  grid.appendChild(cell);
  frames.push(cell.querySelector("iframe"));
}

function fit() {
  for (const f of frames) {
    const w = f.parentElement.clientWidth;
    f.style.transform = `scale(${w / 1440})`;
    f.parentElement.style.height = Math.round(1235 * (w / 1440)) + "px";
  }
}
new ResizeObserver(fit).observe(grid);
fit();

function apply(variant) {
  for (const f of frames) {
    const doc = f.contentDocument;
    if (!doc || !doc.documentElement) continue;
    const root = doc.documentElement;
    for (const k of TOUCHED) root.style.removeProperty(k);
    for (const [k, v] of Object.entries(variant.vars)) root.style.setProperty(k, v);
  }
}

const sw = document.getElementById("sw");
const note = document.getElementById("note");
Object.entries(VARIANTS).forEach(([name, variant], i) => {
  const b = document.createElement("button");
  b.className = "chip" + (i === 0 ? " on" : "");
  b.innerHTML = `<i style="background:${variant.swatch}"></i>${name}`;
  b.addEventListener("click", () => {
    sw.querySelectorAll(".chip").forEach(c => c.classList.remove("on"));
    b.classList.add("on");
    apply(variant);
    note.textContent = i === 0
      ? "tokens.css is the shipped default"
      : "preview only · to ship it, edit src/tokens.ts and npm run tokens";
  });
  sw.appendChild(b);
});

/* re-apply the active variant once frames finish loading */
frames.forEach(f => f.addEventListener("load", () => {
  const active = [...sw.querySelectorAll(".chip")].findIndex(c => c.classList.contains("on"));
  apply(Object.values(VARIANTS)[Math.max(0, active)]);
}));
</script>
</body>
</html>
